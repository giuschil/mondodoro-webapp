name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Hostinger
        uses: hostinger/deploy-action@v1
        with:
          api-key: ${{ secrets.HOSTINGER_API_KEY }}
          virtual-machine: ${{ vars.HOSTINGER_VM_ID }}
          project-name: regalinoit
          docker-compose-path: docker-compose.prod.yml

      - name: Run migrations and collect static
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 168.231.85.166 >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/id_ed25519 root@168.231.85.166 << 'ENDSSH'
            set -e
            cd /var/www/regalino.it
            docker compose -f docker-compose.prod.yml exec -T backend python manage.py migrate --noinput
            docker compose -f docker-compose.prod.yml exec -T backend python manage.py collectstatic --noinput
            echo "✓ Migrazioni completate"
          ENDSSH
