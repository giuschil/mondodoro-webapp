name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 168.231.85.166 >> ~/.ssh/known_hosts

      - name: Upload code to VPS
        run: |
          git archive HEAD | gzip > /tmp/deploy.tar.gz
          scp -i ~/.ssh/id_ed25519 /tmp/deploy.tar.gz root@168.231.85.166:/tmp/deploy.tar.gz

      - name: Inject secrets into VPS .env
        run: |
          ssh -i ~/.ssh/id_ed25519 root@168.231.85.166 \
            "grep -q '^BREVO_API_KEY=' /var/www/regalino.it/.env 2>/dev/null \
              && sed -i 's|^BREVO_API_KEY=.*|BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}|' /var/www/regalino.it/.env \
              || echo 'BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}' >> /var/www/regalino.it/.env"

      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 root@168.231.85.166 << 'ENDSSH'
            set -e

            echo "==> Extracting new code..."
            mkdir -p /var/www/regalino.it
            cd /var/www/regalino.it
            tar -xzf /tmp/deploy.tar.gz
            rm /tmp/deploy.tar.gz

            echo "==> Building and restarting containers..."
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

            echo "==> Running migrations..."
            docker compose -f docker-compose.prod.yml exec -T backend python manage.py migrate --noinput

            echo "==> Collecting static files..."
            docker compose -f docker-compose.prod.yml exec -T backend python manage.py collectstatic --noinput

            echo "==> Cleaning up Docker images..."
            docker image prune -f
            docker builder prune -f --keep-storage 2gb

            echo "==> Deploy completato!"
          ENDSSH
