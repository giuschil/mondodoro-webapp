<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fffbeb"/>
      <stop offset="100%" style="stop-color:#fef9c3"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#eab308"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="280" fill="#fde68a" opacity="0.4"/>
  <circle cx="150" cy="530" r="200" fill="#fef08a" opacity="0.3"/>

  <!-- Card -->
  <rect x="60" y="60" width="1080" height="510" rx="32" fill="white" opacity="0.85"/>

  <!-- Logo icon (sparkle/diamond shape) -->
  <g transform="translate(140, 200)">
    <polygon points="40,0 50,30 80,40 50,50 40,80 30,50 0,40 30,30" fill="url(#gold)"/>
    <polygon points="40,10 47,28 65,35 47,42 40,60 33,42 15,35 33,28" fill="#fbbf24" opacity="0.6"/>
  </g>

  <!-- Brand name -->
  <text x="210" y="255" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#111827" letter-spacing="-2">ListDreams</text>

  <!-- Tagline -->
  <text x="140" y="320" font-family="Arial, sans-serif" font-size="32" fill="#6b7280">Liste regalo digitali per gioiellerie</text>

  <!-- Divider -->
  <rect x="140" y="360" width="920" height="3" rx="2" fill="url(#gold)" opacity="0.6"/>

  <!-- Features row -->
  <text x="140" y="420" font-family="Arial, sans-serif" font-size="26" fill="#374151">✦ Crea liste in 2 minuti</text>
  <text x="460" y="420" font-family="Arial, sans-serif" font-size="26" fill="#374151">✦ Pagamenti via Stripe</text>
  <text x="780" y="420" font-family="Arial, sans-serif" font-size="26" fill="#374151">✦ 100% sicuro</text>

  <!-- URL -->
  <text x="140" y="500" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#d97706">www.listdreams.it</text>
</svg>
